<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PW Хелпер — інструменти для Perfect World</title>
  <meta name="description" content="PW Хелпер: заточка, шари, спорядження, лялька персонажа, уміння, бій і РБ для Perfect World." />
  <!-- keywords: рос. терміни для пошуку по запитах російською (per-route оновлює React/пререндер) -->
  <meta name="keywords" content="Perfect World, Совершенный мир, ПВ, PW, калькулятор, заточка, шари, шары, спорядження, снаряжение, лялька персонажа, кукла персонажа, уміння, умения, джинн, питомець, питомец, бій, бой, РБ, гайди, гайды" />
  <!-- Open Graph / Twitter: базові теги для шерінгу (краулери не виконують JS;
       динамічні title/description на вкладку оновлює React — див. src/app/PageMeta.tsx) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="PW Хелпер" />
  <meta property="og:title" content="PW Хелпер — інструменти для Perfect World" />
  <meta property="og:description" content="Заточка, шари, спорядження, лялька персонажа, уміння, бій і РБ для Perfect World." />
  <meta property="og:image" content="assets/favicon-180.jpg" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="PW Хелпер — інструменти для Perfect World" />
  <meta name="twitter:description" content="Заточка, шари, спорядження, лялька персонажа, уміння, бій і РБ для Perfect World." />
  <meta name="twitter:image" content="assets/favicon-180.jpg" />
  <script>
    // Стан меню до рендеру (без FOUC): відкрите на десктопі, сховане на вузьких.
    document.documentElement.classList.toggle('nav-open', window.innerWidth > 880);
    // Тема до рендеру (без FOUC): light — дефолт, dark — оригінальна.
    document.documentElement.setAttribute(
      'data-theme',
      localStorage.getItem('pw-theme') === 'light' ? 'light' : 'dark'
    );
  </script>
  <link rel="icon" type="image/jpeg" sizes="32x32" href="assets/favicon-32.jpg" />
  <link rel="icon" type="image/jpeg" sizes="180x180" href="assets/favicon-180.jpg" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cinzel:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <script src="./assets/vendor/leaflet/leaflet.js"></script>

</body>
</html>
